longDescription: |
  CP Pong is a lightweight two-player Pong game built for the CASIO ClassPad II (fx-CP400) running Hollyhock-3. Designed for quick sessions and local multiplayer, it delivers responsive controls and classic arcade gameplay optimized for calculator hardware.

  ## Features

  - **Two-player local multiplayer**: compete against a friend on the same device
  - **Responsive controls**: smooth paddle movement with minimal input lag
  - **Simple interface**: clean visuals focused on gameplay clarity
  - **Instant restart**: resume play quickly after each round
  - **Low resource usage**: runs efficiently on stock ClassPad II hardware

  ## Installation

  1. Download the latest CPPong.hh3 file from the official repository
  2. Copy the file to the root directory of your calculator storage (do not place it inside a subfolder)
  3. Launch the Hollyhock-3 application menu and select CP Pong to start

  ## Controls

  | Action | Player 1 | Player 2 |
  |--------|----------|----------|
  | Move Up | Left Arrow | 1 |
  | Move Down | Right Arrow | 3 |
  | Restart Game | 5 | 5 |
  | Quit Game | EXE or Clear | EXE or Clear |

  Both players share the same keypad. Coordinate with your opponent to avoid input conflicts during intense rallies.

  ## Requirements

  - CASIO ClassPad II (fx-CP400 or compatible model)
  - Hollyhock-3 custom firmware
  - Approximately 1 MB free storage space

  ## Credits

  - Original HHK2 implementation by SnailMath: https://github.com/SnailMath/CPpong
  - Hollyhock-3 template by QBos07: https://github.com/QBos07/HHK3template

  ## Community and Support

  For feedback, bug reports, or discussion about CP Pong and other ClassPad homebrew, visit the Snail Math Discord server: https://discord.com/invite/knpcNJTzpd

  ## Troubleshooting

  If the game does not appear in the Hollyhock launcher, verify that the .hh3 file is placed directly in the calculator root directory and not inside any folder. If controls feel unresponsive, ensure no other background processes are interfering with input handling. For persistent issues, consult the project repository or community channels for updates and compatibility notes.