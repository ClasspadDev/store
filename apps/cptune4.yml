longDescription: |
  CPTune4 is a powerful overclocking and benchmarking utility for CASIO ClassPad II calculators running Hollyhock.

  ## Features

  - **Real-time frequency monitoring** — view CPU, PLL, SFO, BFC, and PFC frequencies live
  - **FLL multiplier tuning** — overclock up to ×2047 (and full-range for both SELXM 1 and 1/2) (use with caution!)
  - **Memory tester** — verify RAM and ROM integrity with RAM Only, ROM & RAM, or skip
  - **Dhrystone benchmark** — measure raw CPU performance in iterations per second
  - **FPS counter** — see your display refresh rate in real time

  ## Usage

  Launch from the Hollyhock app menu. Use arrow keys to navigate and adjust frequency multipliers. Press **[7]** to capture current values, **[8]** for help.

  > ⚠ Overclocking beyond stable limits may cause the calculator to freeze. A battery pull safely resets it.

  ## Compatibility

  Tested on ClassPad II (fx-CP400+E) with Hollyhock firmware. Not compatible with non-Hollyhock devices.
