# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: ClasspadDev/store
  branch: main

# Default/fallback media location (used when no field-level folder is set)
media_folder: /images
public_folder: /store/images

collections:
  - name: apps
    label: Apps
    label_singular: App
    folder: /apps
    format: yaml
    extension: yml
    create: true
    identifier_field: name
    slug: "{{fields.slug}}"
    fields:
      - { label: ID, name: id, widget: number, value_type: int, hint: "Unique numeric ID for this app" }
      - { label: Slug, name: slug, widget: string, hint: "URL-friendly identifier, used as filename (e.g. cp-doom). Also becomes the screenshot subfolder name." }
      - { label: Name, name: name, widget: string }
      - { label: Author, name: author, widget: string }
      - { label: Description, name: description, widget: text }

      - label: Cover Image
        name: image
        widget: image
        # Covers live at  /images/cover/<file>  →  public /store/images/cover/<file>
        media_folder: /images/cover
        public_folder: /store/images/cover
        hint: "Main card thumbnail — stored in /images/cover/"
        required: false

      - label: Screenshots / Gallery
        name: screenshots
        widget: list
        required: false
        hint: "Per-app screenshots for the detail page carousel — stored in /images/<slug>/"
        field:
          label: Screenshot
          name: screenshot
          widget: image
          # Each app gets its own subfolder: /images/<slug>/
          media_folder: "/images/{{fields.slug}}"
          public_folder: "/store/images/{{fields.slug}}"

      - { label: Download URL, name: downloadUrl, widget: string }
      - { label: Details URL, name: detailsUrl, widget: string }
      - { label: File Format, name: format, widget: string, default: ".hh3" }
      - label: Tags
        name: tags
        widget: list
        field: { label: Tag, name: tag, widget: string }
      - label: Image Position
        name: position
        widget: string
        required: false
        hint: "CSS background-position for the cover, e.g. '0 19%' or 'top' (leave blank for default)"