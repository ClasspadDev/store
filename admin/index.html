<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="robots" content="noindex" />
  <title>Sveltia CMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Poppins:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
</head>

<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>

  <script>
    // ── Register the site CSS so card styles match production ────────────────
    CMS.registerPreviewStyle("../common.css");

    // ── Extra overrides scoped to the preview pane only ──────────────────────
    CMS.registerPreviewStyle(
      `
        /* Reset preview pane so the dark theme takes hold */
        body {
          background-color: #1f2325;
          color: #f4f4f5;
          font-family: 'Poppins', Arial, Helvetica, sans-serif;
          padding: 1.5rem;
          min-height: 100vh;
        }

        /* Wrapper that centres the single card */
        .preview-wrapper {
          max-width: 560px;
          margin: 0 auto;
        }

        /* Keep image height sane inside the narrow pane */
        .app-image {
          width: 120px;
          height: 200px;
        }

        /* Placeholder when no image URL is set */
        .app-image.no-image {
          background-color: #2d3235 !important;
          background-image: repeating-linear-gradient(
            45deg,
            rgba(0,220,104,0.05) 0px,
            rgba(0,220,104,0.05) 1px,
            transparent 1px,
            transparent 10px
          ) !important;
          display: flex;
          align-items: center;
          justify-content: center;
          color: #3f3f46;
          font-size: 2rem;
        }

        /* "no data" state */
        .preview-empty {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: 60vh;
          color: #3f3f46;
          gap: 0.75rem;
          font-size: 0.9rem;
          text-align: center;
        }
        .preview-empty svg { opacity: 0.4; }

        /* Format badge */
        .format-badge {
          display: inline-block;
          padding: 0.15rem 0.5rem;
          border-radius: 4px;
          font-size: 0.7rem;
          font-weight: 600;
          font-family: monospace;
          background: rgba(0,220,104,0.15);
          color: #00dc68;
          border: 1px solid rgba(0,220,104,0.3);
          margin-left: 0.4rem;
        }
        /* Screenshots strip */
        .preview-screenshots {
          margin-top: 1rem;
          display: flex;
          gap: 0.5rem;
          overflow-x: auto;
          padding-bottom: 0.5rem;
        }
        .preview-screenshots:empty { display: none; }
        .preview-screenshot {
          flex-shrink: 0;
          width: 140px;
          height: 100px;
          border-radius: 6px;
          background-size: cover;
          background-position: center;
          border: 1px solid rgba(255,255,255,0.1);
          background-color: #2d3235;
        }
        .screenshots-label {
          font-size: 0.7rem;
          font-weight: 600;
          text-transform: uppercase;
          letter-spacing: 1px;
          color: #3f3f46;
          margin-top: 1rem;
          margin-bottom: 0.4rem;
        }
        `,
      { raw: true }
    );

    // ── Preview template for the "apps" collection ────────────────────────────
    var h = window.h || ((...args) => {
      // tiny hyperscript shim – Sveltia exposes React-compatible `h`
      const [tag, props, ...children] = args;
      const el = document.createElement(tag);
      if (props) {
        for (const [k, v] of Object.entries(props)) {
          if (k === "className") el.className = v;
          else if (k === "style" && typeof v === "object") Object.assign(el.style, v);
          else el.setAttribute(k, v);
        }
      }
      for (const child of children.flat()) {
        if (child == null) continue;
        el.append(typeof child === "string" ? document.createTextNode(child) : child);
      }
      return el;
    });

    CMS.registerPreviewTemplate("apps", ({ entry }) => {
      const data = entry.get("data");
      const get = (key) => data.get(key) ?? "";

      const name = get("name") || "Untitled App";
      const author = get("author") || "Unknown Author";
      const description = get("description") || "";
      const image = get("image") || "";
      const downloadUrl = get("downloadUrl") || "#";
      const detailsUrl = get("detailsUrl") || "#";
      const format = get("format") || ".hh3";
      const position = get("position") || "center";

      const tagsRaw = data.get("tags");
      const tags = tagsRaw
        ? (tagsRaw.toJS ? tagsRaw.toJS() : Array.from(tagsRaw))
        : [];

      const screenshotsRaw = data.get("screenshots");
      const screenshots = screenshotsRaw
        ? (screenshotsRaw.toJS ? screenshotsRaw.toJS() : Array.from(screenshotsRaw))
        : [];

      const hasImage = image && image.trim() !== "";
      const imageStyle = hasImage
        ? `background-image: url('${image}'); background-position: ${position || "center"};`
        : "";

      const screenshotsHtml = screenshots.length
        ? `
          <div class="screenshots-label">📷 Screenshots (${screenshots.length})</div>
          <div class="preview-screenshots">
            ${screenshots.map(src => `
              <div class="preview-screenshot"
                style="background-image:url('${src}')"
                title="${src}"
              ></div>
            `).join("")}
          </div>
        `
        : "";

      return `
          <div class="preview-wrapper">
            <div class="app-card">

              <div class="app-header">
                <div>
                  <div class="app-title">${name}<span class="format-badge">${format}</span></div>
                  <div class="app-author">by ${author}</div>
                </div>
              </div>

              <div class="app-body">
                <div
                  class="app-image${hasImage ? "" : " no-image"}"
                  style="${imageStyle}"
                >${hasImage ? "" : "🖼️"}</div>

                <div class="app-details">
                  <div class="app-description">${description || '<span style="color:#3f3f46;font-style:italic">No description yet…</span>'}</div>

                  <div class="app-tags">
                    ${tags.length
          ? tags.map(t => `<span class="app-tag">${t}</span>`).join("")
          : '<span style="color:#3f3f46;font-style:italic;font-size:0.75rem">No tags</span>'
        }
                  </div>

                  <div class="app-actions">
                    <a class="btn btn-primary app-btn" href="${downloadUrl}" target="_blank">
                      ↓ Download
                    </a>
                    <a class="btn btn-secondary app-btn" href="${detailsUrl}" target="_blank">
                      ℹ Details
                    </a>
                  </div>
                </div>
              </div>

            </div>

            ${screenshotsHtml}
          </div>
        `;
    });
  </script>
</body>

</html>
